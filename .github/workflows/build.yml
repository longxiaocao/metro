# Phase 6.7: GitHub Actions CI for MeteorBladeEnhancer
#
# 目标：
#   1. 跑 cmake configure + build（带 BUILD_TESTS=ON）
#   2. 跑 ctest（unit tests）
#   3. 上传构建产物 ddfix.dll
#
# 平台：windows-latest（VS 2022 + Windows SDK 10）
# 注意：ddfix 是 Windows-only 项目，DX6/DX9/DInput8/Strmiids 都只能在 Windows 上链

name: build-and-test

on:
  # Phase 8.12: 监听 public（原监听 main, master, develop, 'phase-*'）
  # 仓库默认分支已切到 public；main 已删除；保留 master/develop 兜底
  push:
    branches: [ public, master, develop ]
  pull_request:
    branches: [ public, master, develop ]
  workflow_dispatch:

# 防止多个 push 同时跑（节省 runner 时间）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CMake configuration
  BUILD_TYPE: Release
  GAME_EXE: ""           # 测试用不到，留空
  GAME_STARTUP_ARGS: "w"

jobs:
  build-windows:
    name: Windows Build + Tests
    runs-on: windows-latest

    steps:
      # -------------------- 1. checkout --------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # -------------------- 2. setup MSVC --------------------
      # Phase 8.25.15: 切到 x86 (Win32) toolchain.
      #   原因: 项目自带的 ExtraDxSDK/Lib/d3dx9.lib 是 i386 (32-bit) ar 格式, 与 x64 build
      #   不兼容 (CI #42 LNK1181 cannot open input file 'd3dx9.lib' + 4 个 D3DX LNK2019).
      #   MSVC x64 link.exe 拒绝链接 32-bit obj 库.
      #   Win32 (32-bit) build 匹配 d3dx9.lib 架构, link 成功.
      #   32-bit ddfix.dll 仍可在 64-bit Windows 上运行 (WOW64).
      - name: Setup MSVC (Developer Command Prompt)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      # -------------------- 3. setup CMake --------------------
      - name: Setup CMake
        uses: lukka/get-cmake@latest

      # -------------------- 4. configure --------------------
      # 注：BUILD_TESTS=ON 是 Phase 5.3 引入，Phase 6.1 开启
      #      fxc.exe 由 Visual Studio + Windows SDK 自带
      # Phase 7: 用 Visual Studio 17 2022 generator（最稳定，避免 Ninja 与 MSVC toolchain 配置问题）
      # Phase 8: 把 Windows SDK bin 加入 PATH，让 fxc.exe 可被 find_program 探测到
      # Phase 8.2: 单独跑 cmake 帮助命令验证环境，再正式 configure
      - name: Verify CMake environment
        shell: pwsh
        continue-on-error: true   # 验证步骤失败不阻塞
        run: |
          # 把 fxc.exe 路径加入 PATH
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          if (Test-Path $sdkRoot) {
            $fxcDirs = Get-ChildItem $sdkRoot -Directory -ErrorAction SilentlyContinue |
                       Where-Object { Test-Path (Join-Path $_.FullName "x64\fxc.exe") } |
                       ForEach-Object { $_.FullName + "\x64" }
            foreach ($d in $fxcDirs) { $env:PATH = "$d;$env:PATH" }
          }
          Write-Host "::notice::cmake version: $(cmake --version 2>&1 | Select-Object -First 1)"
          $fxc = Get-Command fxc.exe -ErrorAction SilentlyContinue
          if ($fxc) { Write-Host "::notice::fxc.exe: $($fxc.Source)" }
          else { Write-Host "::warning::fxc.exe NOT in PATH" }
          Write-Host "::notice::WindowsKits10: $([bool](Test-Path 'C:/Program Files (x86)/Windows Kits/10'))"
          Write-Host "::notice::ExtraDxSDK/Include: $([bool](Test-Path './ExtraDxSDK/Include'))"
          Write-Host "::notice::ExtraDxSDK/Lib: $([bool](Test-Path './ExtraDxSDK/Lib'))"
          Write-Host "::notice::ColorKey.hlsl: $([bool](Test-Path './ddfix/ddraw/ColorKey.hlsl'))"
          Write-Host "::notice::PWD: $((Get-Location).Path)"
          Write-Host "::notice::Available Visual Studio generators:"
          $vsGens = cmake --help 2>&1 | Select-String "Visual Studio" | ForEach-Object { $_.Line }
          foreach ($g in $vsGens) { Write-Host "::notice::  $g" }

      - name: Configure CMake
        shell: pwsh
        run: |
          # Phase 8: 把 fxc.exe 路径加入 PATH
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          if (Test-Path $sdkRoot) {
            $fxcDirs = Get-ChildItem $sdkRoot -Directory -ErrorAction SilentlyContinue |
                       Where-Object { Test-Path (Join-Path $_.FullName "x64\fxc.exe") } |
                       ForEach-Object { $_.FullName + "\x64" }
            foreach ($d in $fxcDirs) { $env:PATH = "$d;$env:PATH" }
          }
          New-Item -ItemType Directory -Force -Path build | Out-Null
          # Phase 8.6: 用 & + 数组展开调用 cmake，避免 Start-Process 对带空格参数的分词 bug
          #   原实现：Start-Process -ArgumentList @("-G", "Visual Studio 17 2022", ...)
          #   现象：cmake 收到 "Visual" 而非 "Visual Studio 17 2022"，报 "Could not create named generator Visual"
          #   修复：& cmake @args 走 PowerShell 7+ 的 splat 路径，整串作为单个参数传递
          # Phase 8.7: 改用 Visual Studio 18 2026
          #   原因：windows-latest runner 默认装的是 VS 18 2026（带星号 = cmake --help 标注的默认 generator），
          #   ilammy/msvc-dev-cmd@v1 虽激活 MSVC env，但 cmake 用 vswhere 找不到 VS 17 2022 实例
          #   现象：CMake Error: could not find any instance of Visual Studio (generator=Visual Studio 17 2022)
          #   修复：跟随 runner 实际安装，改用 VS 18 2026
          # Phase 8.25.15: 去掉 `-A x64` 让默认 Win32 平台生效 (vs MSVC toolchain 上面已切到 x86).
          #   原因: d3dx9.lib 是 32-bit, x64 build LNK1181 找不到. 切 Win32 匹配 lib 架构.
          $cmakeArgs = @(
            '-S', '.'
            '-B', 'build'
            '-G', 'Visual Studio 18 2026'
            '-A', 'Win32'
            '-DBUILD_TESTS=ON'
            '-DBUILD_DDFIX_LIB=OFF'
            "-DGameExe=$($env:GAME_EXE)"
            "-DGameStartupArgs=$($env:GAME_STARTUP_ARGS)"
          )
          # *> 合并 stdout+stderr 到 configure.log（PowerShell 7+ 支持）
          & cmake @cmakeArgs *> build\configure.log
          $cmakeExit = $LASTEXITCODE
          Write-Host "::notice::CMake exit code: $cmakeExit"
          # Phase 8.8: 把 configure.log 完整内容写入 step summary（不受 annotations 100 行限制）
          if (Test-Path build\configure.log) {
            Write-Host "--- CMake output (last 80 lines) ---"
            Get-Content build\configure.log -Tail 80
            if ($env:GITHUB_STEP_SUMMARY) {
              "`n## Configure CMake log`n``````n$((Get-Content build\configure.log -Raw) -replace '```', '`u0060`u0060`u0060')`n``````n" |
                Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
            }
          }
          if ($cmakeExit -ne 0) {
            if (Test-Path build\configure.log) {
              $errTail = Get-Content build\configure.log -Tail 80
              foreach ($line in $errTail) { Write-Host "::error::$line" }
            } else {
              Write-Host "::error::CMake configure failed (no log captured)"
            }
            exit $cmakeExit
          }

      # -------------------- 5. build --------------------
      # Phase 7: 捕获 build 输出到日志，失败时显示最后 200 行
      - name: Build
        shell: pwsh
        run: |
          # Phase 8.25.17: 把 fxc.exe 路径加入 PATH, 防止 add_custom_command 调 fxc 时找不到.
          #   CI 上 ilammy/msvc-dev-cmd 已激活 MSVC env, 但 PATH 不一定包含 Windows SDK bin.
          #   find_program 在 Configure 阶段用绝对路径, 但 VS multi-config generator 在
          #   Build 阶段会重启 cmd 时 PATH 可能丢失.
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          if (Test-Path $sdkRoot) {
            $fxcDirs = Get-ChildItem $sdkRoot -Directory -ErrorAction SilentlyContinue |
                       Where-Object { Test-Path (Join-Path $_.FullName "x64\fxc.exe") } |
                       ForEach-Object { $_.FullName + "\x64" }
            foreach ($d in $fxcDirs) { $env:PATH = "$d;$env:PATH" }
          }
          # Phase 8.25.18: 显式构建 ddfix + ddfixtests, 把每个 target 的错误分开捕获,
          #   避免 ddfixtests 编译/链接错误被 ddfix.dll 错误吞掉 (CI #44/45 只看到
          #   ddfixtests.exe not found, 看不到具体编译/链接错误).
          Write-Host "::group::Building ddfix.dll (SHARED library)"
          cmake --build build --config ${{ env.BUILD_TYPE }} --target ddfix -j 2>&1 | Tee-Object -FilePath build\build_ddfix.log
          $ddfixExit = $LASTEXITCODE
          Write-Host "::endgroup::"
          if ($ddfixExit -ne 0) {
            Write-Host "::error::ddfix.dll build failed, exit code $ddfixExit"
            Get-Content build\build_ddfix.log -Tail 100
            if ($env:GITHUB_STEP_SUMMARY) {
              "`n## ddfix build log`n``````n$((Get-Content build\build_ddfix.log -Raw) -replace '```', '`u0060`u0060`u0060')`n``````n" |
                Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
            }
            New-Item -ItemType Directory -Force -Path build\ci-artifacts | Out-Null
            Copy-Item build\build_ddfix.log build\ci-artifacts\build_ddfix.log -Force
            exit $ddfixExit
          }
          Write-Host "::group::Building ddfixtests.exe"
          cmake --build build --config ${{ env.BUILD_TYPE }} --target ddfixtests -j 2>&1 | Tee-Object -FilePath build\build_ddfixtests.log
          $testsExit = $LASTEXITCODE
          Write-Host "::endgroup::"
          if ($testsExit -ne 0) {
            Write-Host "::error::ddfixtests.exe build failed, exit code $testsExit"
            # Phase 8.25.19: 把 build_ddfixtests.log 中所有 MSVC error / fatal error
            #   行提取为 ::error:: 注解, 让 WebFetch / GitHub UI annotation 能抓到具体
            #   编译错误。之前只 echo 到 stdout (Get-Content -Tail 100), WebFetch 抓不到。
            if (Test-Path build\build_ddfixtests.log) {
              $msvcErrors = Get-Content build\build_ddfixtests.log |
                            Select-String -Pattern "error\s+(C|LNK)[0-9]+|fatal error" |
                            Select-Object -First 20
              foreach ($line in $msvcErrors) {
                # GitHub annotation 限定一行 ≤ 1000 字符, 截断
                $msg = $line.ToString()
                if ($msg.Length -gt 900) { $msg = $msg.Substring(0, 900) + "..." }
                Write-Host "::error::$msg"
              }
              # 如果没有 MSVC error 行, 至少输出 log 末尾 50 行让 GitHub UI 可见
              if (-not $msvcErrors -or $msvcErrors.Count -eq 0) {
                $tail = Get-Content build\build_ddfixtests.log -Tail 50
                foreach ($line in $tail) {
                  $msg = $line.ToString()
                  if ($msg.Length -gt 900) { $msg = $msg.Substring(0, 900) + "..." }
                  Write-Host "::error::$msg"
                }
              }
            } else {
              Write-Host "::error::build_ddfixtests.log not found"
            }
            if ($env:GITHUB_STEP_SUMMARY) {
              "`n## ddfixtests build log`n``````n$((Get-Content build\build_ddfixtests.log -Raw) -replace '```', '`u0060`u0060`u0060')`n``````n" |
                Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
            }
            New-Item -ItemType Directory -Force -Path build\ci-artifacts | Out-Null
            Copy-Item build\build_ddfixtests.log build\ci-artifacts\build_ddfixtests.log -Force
            exit $testsExit
          }
          # 把两个 log 合并成 build.log, 保持向后兼容
          if (Test-Path build\build_ddfix.log) { Get-Content build\build_ddfix.log | Out-File -Append -FilePath build\build.log -Encoding utf8 }
          if (Test-Path build\build_ddfixtests.log) { Get-Content build\build_ddfixtests.log | Out-File -Append -FilePath build\build.log -Encoding utf8 }
          if (Test-Path build\build.log) {
            New-Item -ItemType Directory -Force -Path build\ci-artifacts | Out-Null
            Copy-Item build\build.log build\ci-artifacts\build.log -Force
          }

      # -------------------- 6. test (ctest) --------------------
      # ctest 会从 build/ 跑 ddfixtests
      - name: Run unit tests
        shell: pwsh
        run: |
          cd build
          ctest --output-on-failure -C ${{ env.BUILD_TYPE }} --verbose

      # 或直接跑 ddfixtests 二进制（更详细的 PASS/FAIL 输出）
      - name: Run ddfixtests directly
        shell: pwsh
        if: always()  # 即使 ctest fail 仍跑，保留诊断输出
        run: |
          $exe = "build\tests\${{ env.BUILD_TYPE }}\ddfixtests.exe"
          if (Test-Path $exe) {
            & $exe --list
            & $exe
            $exitCode = $LASTEXITCODE
            Write-Host "::notice::ddfixtests exit code: $exitCode"
            if ($exitCode -ne 0) {
              Write-Host "::error::ddfixtests failed with exit code $exitCode"
              exit $exitCode
            }
          } else {
            Write-Host "::error::ddfixtests.exe not found at $exe"
            exit 1
          }

      # -------------------- 7. 上传构建产物 --------------------
      - name: Upload ddfix.dll
        uses: actions/upload-artifact@v4
        with:
          name: ddfix-windows-${{ env.BUILD_TYPE }}
          path: |
            build/bin/ddfix.dll
            build/lib/*.lib
            build/ddfix/ColorKeyHLSLC.h
          if-no-files-found: warn
          retention-days: 14

      # -------------------- 8. 上传测试日志（即使失败也保留） --------------------
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            build/Testing/**/*.log
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
            build/configure.log
            build/configure.out
            build/configure.err
            build/build.log
            build/ci-artifacts/**
          if-no-files-found: ignore
          retention-days: 7

  # -------------------- 第二 job：lint 简单静态检查（可选） --------------------
  lint:
    name: Lint (documentation + format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README exists
        run: |
          if [ ! -f README.md ]; then
            echo "::error::README.md is missing"
            exit 1
          fi
          if [ $(wc -l < README.md) -lt 50 ]; then
            echo "::error::README.md is too short (got $(wc -l < README.md) lines, want >= 50)"
            exit 1
          fi
          echo "README.md OK ($(wc -l < README.md) lines)"

      - name: Check ARCHITECTURE.md exists
        run: |
          if [ ! -f ARCHITECTURE.md ]; then
            echo "::error::ARCHITECTURE.md is missing"
            exit 1
          fi
          if [ $(wc -l < ARCHITECTURE.md) -lt 50 ]; then
            echo "::error::ARCHITECTURE.md is too short"
            exit 1
          fi
          echo "ARCHITECTURE.md OK ($(wc -l < ARCHITECTURE.md) lines)"

      - name: Check ddfix.ini.example exists
        run: |
          if [ ! -f ddfix.ini.example ]; then
            echo "::error::ddfix.ini.example is missing"
            exit 1
          fi
          echo "ddfix.ini.example OK"
